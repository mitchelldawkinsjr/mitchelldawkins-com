<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="640" fill="#f8fafc" rx="12"/>
  <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Issue-to-PR Agent Pipeline</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#64748b">Human gates - Small PRs - Full audit trail</text>

  <!-- HUMAN LAYER -->
  <rect x="24" y="72" width="872" height="88" rx="8" fill="#FFE8E8" stroke="#CA0000" stroke-width="1.5"/>
  <text x="44" y="92" font-size="11" font-weight="700" fill="#A00000">HUMAN LAYER</text>
  <rect x="60" y="100" width="150" height="44" rx="6" fill="#CA0000"/>
  <text x="135" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Create Issue</text>
  <text x="135" y="134" text-anchor="middle" font-size="9" fill="#FFCCCC">Describe the problem</text>
  <rect x="240" y="100" width="150" height="44" rx="6" fill="#CA0000"/>
  <text x="315" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">needs-spec</text>
  <text x="315" y="134" text-anchor="middle" font-size="9" fill="#FFCCCC">Trigger Stage 1</text>
  <rect x="420" y="100" width="150" height="44" rx="6" fill="#CA0000"/>
  <text x="495" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Review Spec</text>
  <text x="495" y="134" text-anchor="middle" font-size="9" fill="#FFCCCC">Acceptance criteria</text>
  <rect x="600" y="100" width="150" height="44" rx="6" fill="#CA0000"/>
  <text x="675" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">ready</text>
  <text x="675" y="134" text-anchor="middle" font-size="9" fill="#FFCCCC">Approve implementation</text>
  <rect x="780" y="100" width="100" height="44" rx="6" fill="#A00000"/>
  <text x="830" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Merge PR</text>
  <text x="830" y="134" text-anchor="middle" font-size="9" fill="#FFCCCC">Final gate</text>

  <line x1="460" y1="160" x2="460" y2="182" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAGE 1 -->
  <rect x="24" y="184" width="872" height="96" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="44" y="204" font-size="11" font-weight="700" fill="#1d4ed8">STAGE 1  issue-spec.yml</text>
  <rect x="60" y="212" width="180" height="52" rx="6" fill="#3b82f6"/>
  <text x="150" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">GitHub Action</text>
  <text x="150" y="246" text-anchor="middle" font-size="9" fill="#dbeafe">Label: needs-spec</text>
  <text x="150" y="258" text-anchor="middle" font-size="9" fill="#dbeafe">~30 seconds</text>
  <rect x="280" y="212" width="180" height="52" rx="6" fill="#2563eb"/>
  <text x="370" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">OpenAI Spec Writer</text>
  <text x="370" y="246" text-anchor="middle" font-size="9" fill="#dbeafe">Reads ai-spec-context.md</text>
  <text x="370" y="258" text-anchor="middle" font-size="9" fill="#dbeafe">Posts AC comment</text>
  <rect x="500" y="212" width="180" height="52" rx="6" fill="#1d4ed8"/>
  <text x="590" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Label Swap</text>
  <text x="590" y="246" text-anchor="middle" font-size="9" fill="#dbeafe">needs-spec - spec-added</text>
  <text x="590" y="258" text-anchor="middle" font-size="9" fill="#dbeafe">Issue stays open</text>
  <rect x="720" y="212" width="160" height="52" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="800" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Spec Comment</text>
  <text x="800" y="246" text-anchor="middle" font-size="9" fill="#64748b">Test plan + scope</text>
  <text x="800" y="258" text-anchor="middle" font-size="9" fill="#64748b">Human review point</text>

  <line x1="460" y1="280" x2="460" y2="302" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAGE 2 -->
  <rect x="24" y="304" width="872" height="96" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="44" y="324" font-size="11" font-weight="700" fill="#15803d">STAGE 2  issue-implement.yml</text>
  <rect x="60" y="332" width="160" height="52" rx="6" fill="#22c55e"/>
  <text x="140" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Guard Checks</text>
  <text x="140" y="366" text-anchor="middle" font-size="9" fill="#dcfce7">spec-added present</text>
  <text x="140" y="378" text-anchor="middle" font-size="9" fill="#dcfce7">No duplicate run</text>
  <rect x="260" y="332" width="180" height="52" rx="6" fill="#16a34a"/>
  <text x="350" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">dispatch-cursor-agent</text>
  <text x="350" y="366" text-anchor="middle" font-size="9" fill="#dcfce7">@cursor/sdk API</text>
  <text x="350" y="378" text-anchor="middle" font-size="9" fill="#dcfce7">ready - agent-working</text>
  <rect x="480" y="332" width="180" height="52" rx="6" fill="#15803d"/>
  <text x="570" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Cursor Cloud Agent</text>
  <text x="570" y="366" text-anchor="middle" font-size="9" fill="#dcfce7">Clone - implement - test</text>
  <text x="570" y="378" text-anchor="middle" font-size="9" fill="#dcfce7">Branch issue-N-slug</text>
  <rect x="700" y="332" width="180" height="52" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="790" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Track at cursor.com</text>
  <text x="790" y="366" text-anchor="middle" font-size="9" fill="#64748b">Agent ID in comment</text>
  <text x="790" y="378" text-anchor="middle" font-size="9" fill="#64748b">Live run visibility</text>

  <line x1="460" y1="400" x2="460" y2="422" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- OUTPUT LAYER -->
  <rect x="24" y="424" width="872" height="96" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="44" y="444" font-size="11" font-weight="700" fill="#7e22ce">OUTPUT  Small, Reversible PR</text>
  <rect x="60" y="452" width="155" height="52" rx="6" fill="#a855f7"/>
  <text x="138" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">npm ci + build</text>
  <text x="138" y="486" text-anchor="middle" font-size="9" fill="#ede9fe">e2e when UI changes</text>
  <text x="138" y="498" text-anchor="middle" font-size="9" fill="#ede9fe">Verify before PR</text>
  <rect x="245" y="452" width="155" height="52" rx="6" fill="#9333ea"/>
  <text x="323" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Open PR</text>
  <text x="323" y="486" text-anchor="middle" font-size="9" fill="#ede9fe">Fixes #N in body</text>
  <text x="323" y="498" text-anchor="middle" font-size="9" fill="#ede9fe">gh pr ready</text>
  <rect x="430" y="452" width="155" height="52" rx="6" fill="#7c3aed"/>
  <text x="508" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Screenshots</text>
  <text x="508" y="486" text-anchor="middle" font-size="9" fill="#ede9fe">artifacts/issue-N/</text>
  <text x="508" y="498" text-anchor="middle" font-size="9" fill="#ede9fe">Linked on issue</text>
  <rect x="615" y="452" width="155" height="52" rx="6" fill="#6d28d9"/>
  <text x="693" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Issue Comment</text>
  <text x="693" y="486" text-anchor="middle" font-size="9" fill="#ede9fe">PR link + summary</text>
  <text x="693" y="498" text-anchor="middle" font-size="9" fill="#ede9fe">pr-opened label</text>
  <rect x="800" y="452" width="80" height="52" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="840" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Revert</text>
  <text x="840" y="492" text-anchor="middle" font-size="9" fill="#64748b">One PR = one rollback</text>

  <!-- LABEL STATE MACHINE -->
  <text x="460" y="548" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">LABEL STATE MACHINE</text>
  <rect x="40" y="558" width="840" height="68" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="460" y="582" text-anchor="middle" font-size="10" fill="#334155">Open - needs-spec - spec-added - ready - agent-working - pr-opened - merged</text>
  <text x="460" y="600" text-anchor="middle" font-size="10" fill="#64748b">Failure path: agent-failed - re-add ready to retry - Every transition logged on the issue</text>
  <text x="460" y="618" text-anchor="middle" font-size="10" fill="#64748b">Each stage is a checkpoint  nothing ships without a human merge</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
