<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 720" font-family="system-ui, -apple-system, sans-serif">
  <rect width="480" height="720" fill="#f8fafc" rx="12"/>
  <text x="240" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Hands-Off Issue Flow</text>
  <text x="240" y="50" text-anchor="middle" font-size="11" fill="#64748b">What happens after you open an issue</text>

  <!-- Step 1 Human -->
  <rect x="140" y="68" width="200" height="48" rx="8" fill="#CA0000"/>
  <text x="240" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">You: open issue</text>
  <text x="240" y="106" text-anchor="middle" font-size="9" fill="#FFCCCC">Product intent</text>
  <rect x="350" y="78" width="56" height="20" rx="4" fill="#FFE8E8" stroke="#CA0000"/>
  <text x="378" y="92" text-anchor="middle" font-size="8" font-weight="600" fill="#A00000">HUMAN</text>

  <line x1="240" y1="116" x2="240" y2="136" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Auto spec -->
  <rect x="100" y="138" width="280" height="56" rx="8" fill="#3b82f6"/>
  <text x="240" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">needs-spec - Planning Agent</text>
  <text x="240" y="176" text-anchor="middle" font-size="9" fill="#dbeafe">spec-added + Task Breakdown</text>
  <rect x="390" y="152" width="44" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="412" y="166" text-anchor="middle" font-size="8" font-weight="600" fill="#1d4ed8">AUTO</text>

  <line x1="240" y1="194" x2="240" y2="214" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Branch decision -->
  <polygon points="240,216 320,256 240,296 160,256" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="240" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Complex?</text>
  <text x="240" y="264" text-anchor="middle" font-size="8" fill="#64748b">migration / route / schema</text>

  <!-- Yes branch -->
  <line x1="320" y1="256" x2="380" y2="256" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="352" y="248" font-size="8" fill="#2563eb">yes</text>
  <rect x="382" y="236" width="88" height="40" rx="6" fill="#2563eb"/>
  <text x="426" y="254" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">needs-</text>
  <text x="426" y="266" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">architecture</text>

  <!-- No branch -->
  <line x1="160" y1="256" x2="100" y2="256" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="148" y="248" font-size="8" fill="#64748b">no</text>
  <rect x="24" y="236" width="74" height="40" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="61" y="260" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">skip</text>

  <line x1="240" y1="296" x2="240" y2="326" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="61" y1="276" x2="61" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="61" y1="340" x2="140" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="426" y1="276" x2="426" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="426" y1="340" x2="340" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Ready + coding -->
  <rect x="100" y="328" width="280" height="56" rx="8" fill="#22c55e"/>
  <text x="240" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">ready - Coding Agent</text>
  <text x="240" y="366" text-anchor="middle" font-size="9" fill="#dcfce7">draft PR - build - e2e - screenshots</text>
  <rect x="390" y="342" width="44" height="20" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="412" y="356" text-anchor="middle" font-size="8" font-weight="600" fill="#15803d">AUTO</text>

  <line x1="240" y1="384" x2="240" y2="404" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Parallel review -->
  <rect x="60" y="406" width="360" height="72" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="240" y="426" text-anchor="middle" font-size="10" font-weight="700" fill="#7e22ce">Parallel review on PR open</text>
  <rect x="76" y="436" width="64" height="28" rx="4" fill="#a855f7"/>
  <text x="108" y="454" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">CI</text>
  <rect x="148" y="436" width="64" height="28" rx="4" fill="#9333ea"/>
  <text x="180" y="454" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">Testing</text>
  <rect x="220" y="436" width="64" height="28" rx="4" fill="#7c3aed"/>
  <text x="252" y="454" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">Bugbot</text>
  <rect x="292" y="436" width="64" height="28" rx="4" fill="#6d28d9"/>
  <text x="324" y="454" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">Ponytail</text>
  <rect x="364" y="436" width="44" height="28" rx="4" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="386" y="454" text-anchor="middle" font-size="7" font-weight="600" fill="#64748b">UI/A11y</text>

  <line x1="240" y1="478" x2="240" y2="498" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Auto fix -->
  <rect x="100" y="500" width="280" height="48" rx="8" fill="#6d28d9"/>
  <text x="240" y="522" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">review-findings - Auto-fix (once)</text>
  <text x="240" y="538" text-anchor="middle" font-size="9" fill="#ede9fe">amends PR branch before you review</text>
  <rect x="390" y="512" width="44" height="20" rx="4" fill="#ede9fe" stroke="#9333ea"/>
  <text x="412" y="526" text-anchor="middle" font-size="8" font-weight="600" fill="#6d28d9">AUTO</text>

  <line x1="240" y1="548" x2="240" y2="568" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Human merge -->
  <rect x="140" y="570" width="200" height="48" rx="8" fill="#A00000"/>
  <text x="240" y="592" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">You: MERGE</text>
  <text x="240" y="608" text-anchor="middle" font-size="9" fill="#FFCCCC">Final approval gate</text>
  <rect x="350" y="580" width="56" height="20" rx="4" fill="#FFE8E8" stroke="#CA0000"/>
  <text x="378" y="594" text-anchor="middle" font-size="8" font-weight="600" fill="#A00000">HUMAN</text>

  <line x1="240" y1="618" x2="240" y2="638" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Deploy -->
  <rect x="100" y="640" width="280" height="56" rx="8" fill="#f59e0b"/>
  <text x="240" y="662" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">deploy-vps + health-check</text>
  <text x="240" y="678" text-anchor="middle" font-size="9" fill="#fef3c7">append lesson on failure</text>
  <rect x="390" y="654" width="44" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="412" y="668" text-anchor="middle" font-size="8" font-weight="600" fill="#b45309">AUTO</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/></marker>
  </defs>
</svg>
