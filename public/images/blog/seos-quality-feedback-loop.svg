<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="340" fill="#f8fafc" rx="12"/>
  <text x="460" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Agent Quality Feedback Loop</text>
  <text x="460" y="50" text-anchor="middle" font-size="11" fill="#64748b">Test hardening in PR #93  same PR as SEOS architecture</text>

  <!-- Agent produces -->
  <rect x="40" y="80" width="160" height="64" rx="8" fill="#22c55e"/>
  <text x="120" y="104" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Coding Agent</text>
  <text x="120" y="120" text-anchor="middle" font-size="9" fill="#dcfce7">implements + runs tests</text>
  <text x="120" y="134" text-anchor="middle" font-size="9" fill="#dcfce7">before opening PR</text>

  <line x1="200" y1="112" x2="228" y2="112" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CI gates -->
  <rect x="230" y="68" width="460" height="88" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="460" y="88" text-anchor="middle" font-size="10" font-weight="700" fill="#7e22ce">CI + E2E GATES (every PR)</text>

  <rect x="246" y="98" width="100" height="44" rx="6" fill="#a855f7"/>
  <text x="296" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">npm run build</text>
  <text x="296" y="132" text-anchor="middle" font-size="8" fill="#ede9fe">unit + lint</text>

  <rect x="358" y="98" width="100" height="44" rx="6" fill="#9333ea"/>
  <text x="408" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">overlay-scroll</text>
  <text x="408" y="132" text-anchor="middle" font-size="8" fill="#ede9fe">mobile modals</text>

  <rect x="470" y="98" width="100" height="44" rx="6" fill="#7c3aed"/>
  <text x="520" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">axe a11y</text>
  <text x="520" y="132" text-anchor="middle" font-size="8" fill="#ede9fe">security.yml</text>

  <rect x="582" y="98" width="100" height="44" rx="6" fill="#6d28d9"/>
  <text x="632" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">e2e suite</text>
  <text x="632" y="132" text-anchor="middle" font-size="8" fill="#ede9fe">journal, nav, etc.</text>

  <line x1="690" y1="112" x2="718" y2="112" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Nightly -->
  <rect x="720" y="80" width="160" height="64" rx="8" fill="#1e293b"/>
  <text x="800" y="104" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Nightly visual.yml</text>
  <text x="800" y="120" text-anchor="middle" font-size="9" fill="#94a3b8">desktop - tablet - mobile</text>
  <text x="800" y="134" text-anchor="middle" font-size="9" fill="#94a3b8">modal snapshots</text>

  <!-- Outcomes row -->
  <line x1="460" y1="156" x2="460" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="120" y="182" width="200" height="56" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="220" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Pass - fewer fix cycles</text>
  <text x="220" y="222" text-anchor="middle" font-size="9" fill="#64748b">Agent output trusted - merge faster</text>

  <rect x="360" y="182" width="200" height="56" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="460" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#b91c1c">Fail - review-findings</text>
  <text x="460" y="222" text-anchor="middle" font-size="9" fill="#64748b">Auto-fix agent amends PR once</text>

  <rect x="600" y="182" width="200" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="700" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">New gap - new test</text>
  <text x="700" y="222" text-anchor="middle" font-size="9" fill="#64748b">Encode in agent-rules/ + regenerate</text>

  <!-- App fixes callout -->
  <rect x="40" y="260" width="840" height="64" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="460" y="282" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">App fixes shipped alongside test hardening</text>
  <text x="460" y="300" text-anchor="middle" font-size="9" fill="#64748b">Hide bottom nav when modals open - journal editor scroll + pinned save - artifact compression (compress:artifacts)</text>
  <text x="460" y="316" text-anchor="middle" font-size="9" fill="#64748b">Better tests - better agent output - fewer agent runs - test investment pays for itself</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
  </defs>
</svg>
