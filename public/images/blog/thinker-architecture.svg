<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="640" fill="#e6e9ef" rx="12"/>
  <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#12161e">Thinker  system architecture</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#5a6472">React PWA · curated content · nginx edge · optional LLM Ask</text>

  <!-- Client -->
  <rect x="24" y="80" width="872" height="100" rx="10" fill="#f4f6fa" stroke="#12161e" stroke-width="1.5"/>
  <text x="44" y="104" font-size="11" font-weight="700" fill="#ff4d3a">CLIENT  installable PWA</text>
  <rect x="44" y="118" width="140" height="44" rx="8" fill="#12161e"/>
  <text x="114" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Home / Feed</text>
  <rect x="200" y="118" width="120" height="44" rx="8" fill="#1a2332"/>
  <text x="260" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Topics</text>
  <rect x="336" y="118" width="120" height="44" rx="8" fill="#1a2332"/>
  <text x="396" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Ask</text>
  <rect x="472" y="118" width="130" height="44" rx="8" fill="#1a2332"/>
  <text x="537" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Resources</text>
  <rect x="618" y="118" width="120" height="44" rx="8" fill="#1a2332"/>
  <text x="678" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Kept</text>
  <rect x="754" y="118" width="120" height="44" rx="8" fill="#ff4d3a"/>
  <text x="814" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">localStorage</text>

  <line x1="460" y1="180" x2="460" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Content -->
  <rect x="24" y="212" width="872" height="120" rx="10" fill="#fff" stroke="#ff4d3a" stroke-width="1.5"/>
  <text x="44" y="236" font-size="11" font-weight="700" fill="#ff4d3a">CONTENT LAYER  static + weekly ingest</text>
  <rect x="44" y="250" width="150" height="60" rx="8" fill="#fff5f3" stroke="#ff4d3a"/>
  <text x="119" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#12161e">Ideas</text>
  <text x="119" y="293" text-anchor="middle" font-size="10" fill="#5a6472">src/data + books</text>
  <rect x="210" y="250" width="150" height="60" rx="8" fill="#fff5f3" stroke="#ff4d3a"/>
  <text x="285" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#12161e">News JSON</text>
  <text x="285" y="293" text-anchor="middle" font-size="10" fill="#5a6472">RSS ingest CI</text>
  <rect x="376" y="250" width="150" height="60" rx="8" fill="#fff5f3" stroke="#ff4d3a"/>
  <text x="451" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#12161e">Scriptures</text>
  <text x="451" y="293" text-anchor="middle" font-size="10" fill="#5a6472">weekly refresh</text>
  <rect x="542" y="250" width="150" height="60" rx="8" fill="#fff5f3" stroke="#ff4d3a"/>
  <text x="617" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#12161e">Resources</text>
  <text x="617" y="293" text-anchor="middle" font-size="10" fill="#5a6472">curated shelf</text>
  <rect x="708" y="250" width="166" height="60" rx="8" fill="#fff5f3" stroke="#ff4d3a"/>
  <text x="791" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#12161e">Gutenberg</text>
  <text x="791" y="293" text-anchor="middle" font-size="10" fill="#5a6472">shelves + IDs</text>

  <line x1="460" y1="332" x2="460" y2="362" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Edge -->
  <rect x="24" y="364" width="872" height="110" rx="10" fill="#1a2332"/>
  <text x="44" y="388" font-size="11" font-weight="700" fill="#ff4d3a">EDGE  nginx on VPS (thinker.360web.cloud)</text>
  <rect x="44" y="404" width="200" height="50" rx="8" fill="#2a3548"/>
  <text x="144" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Static SPA + PWA</text>
  <rect x="260" y="404" width="200" height="50" rx="8" fill="#2a3548"/>
  <text x="360" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">/api/openai/*</text>
  <rect x="476" y="404" width="200" height="50" rx="8" fill="#2a3548"/>
  <text x="576" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">/api/ollama/*</text>
  <rect x="692" y="404" width="182" height="50" rx="8" fill="#2a3548"/>
  <text x="783" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">/api/feed-proxy</text>

  <line x1="360" y1="474" x2="360" y2="504" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="576" y1="474" x2="576" y2="504" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="783" y1="474" x2="783" y2="504" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Backends -->
  <rect x="200" y="506" width="200" height="70" rx="10" fill="#ff4d3a"/>
  <text x="300" y="536" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">OpenAI</text>
  <text x="300" y="556" text-anchor="middle" font-size="11" fill="#ffe8e4">key stays on server</text>

  <rect x="416" y="506" width="200" height="70" rx="10" fill="#12161e"/>
  <text x="516" y="536" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Ollama</text>
  <text x="516" y="556" text-anchor="middle" font-size="11" fill="#94a3b8">local / VPS fallback</text>

  <rect x="632" y="506" width="200" height="70" rx="10" fill="#5a6472"/>
  <text x="732" y="536" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">RSS feeds</text>
  <text x="732" y="556" text-anchor="middle" font-size="11" fill="#e6e9ef">CORS-safe proxy</text>

  <text x="460" y="616" text-anchor="middle" font-size="11" fill="#5a6472">Deploy: push to main ’ Docker compose on 360 Web Solutions Cloud</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
