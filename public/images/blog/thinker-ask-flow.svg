<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="480" fill="#e6e9ef" rx="12"/>
  <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#12161e">Ask  instant path, then LLM refine</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#5a6472">Catalog-only links · never invent URLs · dig deeper on purpose</text>

  <!-- Question -->
  <rect x="310" y="80" width="300" height="50" rx="10" fill="#12161e"/>
  <text x="460" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">User question / card context</text>

  <line x1="460" y1="130" x2="460" y2="158" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Instant -->
  <rect x="160" y="160" width="600" height="80" rx="12" fill="#ff4d3a"/>
  <text x="460" y="192" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">exploreInstant()  keyword match against catalog</text>
  <text x="460" y="216" text-anchor="middle" font-size="12" fill="#ffe8e4">Target &lt;5ms · topics · resources · Gutenberg · always a solid default</text>

  <line x1="460" y1="240" x2="460" y2="268" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Parallel refine -->
  <text x="460" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#5a6472">THEN REFINE (same JSON contract)</text>

  <rect x="80" y="310" width="360" height="90" rx="12" fill="#1a2332"/>
  <text x="260" y="344" text-anchor="middle" font-size="14" font-weight="700" fill="#ff4d3a">OpenAI (preferred)</text>
  <text x="260" y="368" text-anchor="middle" font-size="12" fill="#e6e9ef">gpt-4o-mini via nginx proxy</text>
  <text x="260" y="386" text-anchor="middle" font-size="11" fill="#94a3b8">API key never in the browser bundle</text>

  <rect x="480" y="310" width="360" height="90" rx="12" fill="#2a3548"/>
  <text x="660" y="344" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Ollama (fallback)</text>
  <text x="660" y="368" text-anchor="middle" font-size="12" fill="#e6e9ef">phi3 / mistral on VPS or laptop</text>
  <text x="660" y="386" text-anchor="middle" font-size="11" fill="#94a3b8">Used when OpenAI is not configured</text>

  <line x1="260" y1="400" x2="400" y2="430" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="660" y1="400" x2="520" y2="430" stroke="#94a3b8" stroke-width="1.5"/>

  <rect x="280" y="430" width="360" height="36" rx="8" fill="#fff" stroke="#ff4d3a" stroke-width="1.5"/>
  <text x="460" y="453" text-anchor="middle" font-size="12" font-weight="600" fill="#12161e">answer · digDeeper chips · catalog links only</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
