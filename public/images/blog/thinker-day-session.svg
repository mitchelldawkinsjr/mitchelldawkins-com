<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="420" fill="#e6e9ef" rx="12"/>
  <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#12161e">Device memory  today vs forever</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#5a6472">No account required · localStorage only · calendar day is the session</text>

  <!-- Today box -->
  <rect x="40" y="90" width="400" height="280" rx="14" fill="#1a2332"/>
  <text x="240" y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#ff4d3a">TODAY ONLY</text>
  <text x="240" y="146" text-anchor="middle" font-size="11" fill="#94a3b8">cleared when the local calendar day rolls</text>

  <rect x="70" y="170" width="340" height="50" rx="8" fill="#2a3548"/>
  <text x="240" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">thinker-day-v1 · day key</text>

  <rect x="70" y="236" width="340" height="50" rx="8" fill="#2a3548"/>
  <text x="240" y="266" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">thinker-day-cursor-v1 · card index</text>

  <rect x="70" y="302" width="340" height="50" rx="8" fill="#2a3548"/>
  <text x="240" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">seen / rotation · fresh shuffle</text>

  <!-- Forever box -->
  <rect x="480" y="90" width="400" height="280" rx="14" fill="#f4f6fa" stroke="#ff4d3a" stroke-width="2"/>
  <text x="680" y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#ff4d3a">SURVIVES OVERNIGHT</text>
  <text x="680" y="146" text-anchor="middle" font-size="11" fill="#5a6472">bookmarks and permanent dismissals</text>

  <rect x="510" y="170" width="340" height="50" rx="8" fill="#fff" stroke="#12161e"/>
  <text x="680" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#12161e">thinker-kept · saved ideas</text>

  <rect x="510" y="236" width="340" height="50" rx="8" fill="#fff" stroke="#12161e"/>
  <text x="680" y="266" text-anchor="middle" font-size="13" font-weight="600" fill="#12161e">hidden · permanently dismissed</text>

  <rect x="510" y="302" width="340" height="50" rx="8" fill="#fff" stroke="#12161e"/>
  <text x="680" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="#12161e">subscriptions · custom feeds / sites</text>

  <text x="460" y="400" text-anchor="middle" font-size="12" fill="#5a6472">Home CTA becomes Continue · card N if you left mid-feed today</text>
</svg>
